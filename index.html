<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YGO Arena</title>
    <!-- Ícones FontAwesome (Obrigatório para os ícones aparecerem) -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root { --ouro: #d4af37; --prata: #c0c0c0; --bronze: #cd7f32; --roxo: #4b0082; --preto: #050505; --card: #151515; --v: #2ecc71; --e: #f1c40f; --d: #e74c3c; }
        body { background: var(--preto); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 90px; overflow-x: hidden; }
        
        /* Carregamento */
        #loading { position: fixed; inset: 0; background: var(--preto); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; }
        .eye { font-size: 60px; color: var(--ouro); animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.2; transform: scale(0.8); } }

        /* Dashboard e Pódio Centralizado 2-1-3 */
        .header { background: linear-gradient(to bottom, var(--roxo), var(--preto)); padding: 20px 10px; border-bottom: 3px solid var(--ouro); text-align: center; }
        .podium { display: flex; justify-content: center; align-items: flex-end; gap: 8px; min-height: 220px; padding: 10px; }
        .p-card { background: var(--card); border: 2px solid #333; border-radius: 8px; padding: 10px; flex: 1; text-align: center; font-size: 11px; position: relative; }
        .t1 { height: 190px; border-color: var(--ouro); box-shadow: 0 0 15px var(--ouro); order: 2; z-index: 5; }
        .t2 { height: 150px; border-color: var(--prata); order: 1; }
        .t3 { height: 130px; border-color: var(--bronze); order: 3; }
        .crown { color: var(--ouro); position: absolute; top: -30px; left: 50%; transform: translateX(-50%); font-size: 25px; }

        /* Grid de Status com Ícones */
        .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .stat-card { background: var(--card); border-left: 4px solid var(--ouro); padding: 15px; border-radius: 8px; text-align: center; }
        .stat-card i { color: var(--ouro); font-size: 20px; margin-bottom: 8px; }

        /* Ranking Detalhado e Organizado */
        .rank-box { background: var(--card); margin: 10px 15px; border-radius: 8px; border: 1px solid #333; overflow: hidden; }
        .rank-main { padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        .rank-info { padding: 10px 15px; display: flex; justify-content: space-between; font-size: 11px; background: #0d0d0d; color: #aaa; }

        /* Navegação Inferior Fixa */
        .nav { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 2px solid var(--ouro); display: flex; justify-content: space-around; padding: 12px 0; z-index: 9999; }
        .nav-link { color: #444; text-decoration: none; text-align: center; font-size: 22px; transition: 0.3s; }
        .nav-link.active { color: var(--ouro); text-shadow: 0 0 10px var(--ouro); }
        .nav-link span { display: block; font-size: 10px; font-weight: bold; margin-top: 4px; text-transform: uppercase; }

        .secao { display: none; }
        .ativa { display: block; }
        .btn-gold { background: linear-gradient(45deg, #d4af37, #f1c40f); color: black; border: none; padding: 15px; width: 95%; font-weight: bold; border-radius: 5px; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        input { background: #1a1a1a; border: 1px solid var(--ouro); color: white; padding: 12px; width: 85%; margin: 8px 0; border-radius: 5px; outline: none; }
    </style>
</head>
<body>

<div id="loading"><i class="fas fa-eye eye"></i><p style="color:var(--ouro); margin-top:15px; letter-spacing: 2px;">É HORA DO DUELO!</p></div>

<div id="aba-home" class="secao ativa">
    <div class="header">
        <h3 style="color:var(--ouro); margin:0;">ARENA LENDÁRIA</h3>
        <div class="podium" id="render-podio"></div>
    </div>
    <div class="dash-grid">
        <div class="stat-card"><i class="fas fa-swords"></i><br><small>DUELOS</small><br><b id="d-totais">0</b></div>
        <div class="stat-card"><i class="fas fa-star"></i><br><small>ESTRELAS</small><br><b id="e-totais">0</b></div>
        <div class="stat-card"><i class="fas fa-shark"></i><br><small>SHARK</small><br><b id="shark-n">---</b></div>
        <div class="stat-card"><i class="fas fa-trophy"></i><br><small>MAX APOSTA</small><br><b>10 ⭐</b></div>
    </div>
    <div style="background:var(--card); margin:15px; padding:15px; border-left:4px solid var(--roxo); border-radius:5px;">
        <small style="color:var(--ouro)">MURAL DO JUIZ:</small>
        <p id="mural-txt" style="margin-top:5px; font-size:13px; opacity:0.8;">Buscando avisos...</p>
    </div>
</div>

<div id="aba-ranking" class="secao" style="padding-top:20px;">
    <h3 style="color:var(--ouro); text-align:center;">CLASSIFICAÇÃO</h3>
    <div id="render-ranking"></div>
</div>

<div id="aba-arena" class="secao" style="padding:20px; text-align:center;">
    <h3 style="color:var(--ouro)">ARENA</h3>
    <div style="background:var(--card); padding:20px; border-radius:15px; border:1px solid var(--roxo);">
        <button class="btn-gold" onclick="buscar(0)">DUELO NORMAL</button>
        <button class="btn-gold" onclick="buscar(1)">APOSTAR 1 ⭐</button>
        <button class="btn-gold" onclick="buscar(3)">APOSTAR 3 ⭐</button>
        <button class="btn-gold" onclick="buscar(5)">APOSTAR 5 ⭐</button>
        <button class="btn-gold" onclick="buscar(10)">APOSTAR 10 ⭐</button>
    </div>
</div>

<div id="aba-perfil" class="secao" style="padding:20px; text-align:center;">
    <div id="box-reg">
        <h3 style="color:var(--ouro)">REGISTRO</h3>
        <input type="text" id="nick" placeholder="Nickname">
        <input type="text" id="deck" placeholder="Seu Deck Principal">
        <input type="password" id="pass" placeholder="Senha">
        <button class="btn-gold" onclick="registrar()">INICIAR JORNADA</button>
    </div>
    <div id="box-log" style="display:none; background:var(--card); padding:25px; border-radius:15px; border:2px solid var(--ouro);">
        <i class="fas fa-user-circle" style="font-size:50px; color:var(--ouro)"></i>
        <h2 id="meu-nick-txt" style="color:var(--ouro); margin: 10px 0;"></h2>
        <div style="display:flex; justify-content:space-around; margin-bottom:15px;">
            <div><small>ESTRELAS</small><br><b id="meu-e-txt" style="color:var(--ouro)">0</b></div>
            <div><small>STREAK</small><br><b id="meu-st-txt" style="color:var(--v)">0 🔥</b></div>
        </div>
        <button class="btn-gold" onclick="logout()" style="background:#444; margin-top:20px;">SAIR</button>
    </div>
</div>

<nav class="nav">
    <a href="javascript:void(0)" class="nav-link active" onclick="mudarAba(this, 'home')"><i class="fas fa-home"></i><span>Home</span></a>
    <a href="javascript:void(0)" class="nav-link" onclick="mudarAba(this, 'ranking')"><i class="fas fa-trophy"></i><span>Rank</span></a>
    <a href="javascript:void(0)" class="nav-link" onclick="mudarAba(this, 'arena')"><i class="fas fa-swords"></i><span>Arena</span></a>
    <a href="javascript:void(0)" class="nav-link" onclick="mudarAba(this, 'perfil')"><i class="fas fa-user-circle"></i><span>Perfil</span></a>
</nav>

<script>
    /* ========================================================== */
    /*  COLE SUA URL DO GOOGLE SCRIPTS ABAIXO ENTRE AS ASPAS     */
    /* ========================================================== */
    const URL_API = "https://script.google.com/macros/s/AKfycbyDvLfyGsCeoPEp2XZTKqrbDYR2brbs19diA7-dv5Lw43GigVjNtZHYV0Djeuckg-puhw/exec"; 
    /* ========================================================== */

    function mudarAba(el, nome) {
        document.querySelectorAll('.secao').forEach(a => a.style.display = 'none');
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        const target = document.getElementById('aba-' + nome);
        if(target) target.style.display = 'block';
        el.classList.add('active');
        if(nome === 'home' || nome === 'ranking') carregarDados();
    }

    async function carregarDados() {
        try {
            const rRank = await fetch(URL_API + "?acao=getRanking", {redirect:"follow"});
            const ranking = await rRank.json();
            const rDash = await fetch(URL_API + "?acao=getDashboard", {redirect:"follow"});
            const dash = await rDash.json();

            // Stats
            document.getElementById('e-totais').innerText = ranking.reduce((a,b) => a + (b.estrelas || 0), 0);
            document.getElementById('d-totais').innerText = Math.floor(ranking.reduce((a,b) => a + (b.total || 0), 0) / 2);
            document.getElementById('mural-txt').innerText = dash.mural || "É hora do Duelo!";
            
            if(ranking.length > 0) {
                document.getElementById('shark-n').innerText = ranking[0].nick;
                // Pódio
                document.getElementById('render-podio').innerHTML = `
                    <div class="p-card t2"><b>TOP 2</b><br>${ranking[1]?.nick || '---'}<br><small>${ranking[1]?.estrelas || 0}⭐</small></div>
                    <div class="p-card t1"><i class="fas fa-crown crown"></i><b>TOP 1</b><br>${ranking[0].nick}<br><small>${ranking[0].deck}</small></div>
                    <div class="p-card t3"><b>TOP 3</b><br>${ranking[2]?.nick || '---'}<br><small>${ranking[2]?.estrelas || 0}⭐</small></div>
                `;
                // Lista Ranking
                document.getElementById('render-ranking').innerHTML = ranking.map((d,i) => `
                    <div class="rank-box">
                        <div class="rank-main"><span><b style="color:var(--ouro)">${i+1}º</b> ${d.nick}</span><b>${d.estrelas} ⭐</b></div>
                        <div class="rank-info"><span>Deck: ${d.deck} | 🔥 ${d.streak || 0}</span><span>V:${d.v} E:${d.e} D:${d.d} | <b>${d.winrate}</b></span></div>
                    </div>
                `).join('');
            }
        } catch(e) { console.warn("Sincronizando..."); }
        document.getElementById('loading').style.display = 'none';
    }

    async function registrar() {
        const n = document.getElementById('nick').value, d = document.getElementById('deck').value, p = document.getElementById('pass').value;
        if(!n || !d || !p) return alert("Preencha tudo!");
        document.getElementById('loading').style.display = 'flex';
        const res = await fetch(`${URL_API}?acao=registrar&nick=${n}&deck=${d}&senha=${p}`, {redirect:"follow"});
        const r = await res.json();
        if(r.sucesso) { localStorage.setItem('y_id', r.id); localStorage.setItem('y_n', n); location.reload(); }
        else { alert(r.erro); document.getElementById('loading').style.display = 'none'; }
    }

    window.onload = () => {
        const id = localStorage.getItem('y_id');
        if(id) {
            document.getElementById('box-reg').style.display = 'none';
            document.getElementById('box-log').style.display = 'block';
            document.getElementById('meu-nick-txt').innerText = localStorage.getItem('y_n');
        }
        carregarDados();
    };
    function logout() { localStorage.clear(); location.reload(); }
    function buscar(v) { alert("Buscando oponente para " + v + " estrelas..."); }
</script>
</body>
</html>
