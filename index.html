<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YGO Arena</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root { --dourado: #d4af37; --roxo: #4b0082; --preto: #050505; --card: #121212; }
        body { background: var(--preto); color: white; font-family: sans-serif; margin: 0; padding-bottom: 80px; }
        
        /* Carregamento Lendário */
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--preto); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .eye { font-size: 60px; color: var(--dourado); animation: blink 1.5s infinite; text-shadow: 0 0 20px var(--dourado); }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* Pódio e Dash */
        .header-duel { background: linear-gradient(to bottom, var(--roxo), var(--preto)); padding: 20px; text-align: center; border-bottom: 3px solid var(--dourado); }
        .podium { display: flex; justify-content: center; align-items: flex-end; gap: 8px; min-height: 220px; }
        .p-card { background: var(--card); border: 2px solid var(--dourado); border-radius: 8px; padding: 10px; flex: 1; text-align: center; position: relative; }
        .t1 { height: 190px; border-width: 4px; box-shadow: 0 0 20px var(--dourado); order: 2; }
        .t2 { height: 150px; order: 1; } .t3 { height: 130px; order: 3; }
        
        .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .stat-card { background: var(--card); border-left: 4px solid var(--dourado); padding: 12px; border-radius: 5px; text-align: center; font-size: 14px; }
        
        /* Itens do Ranking Detalhado */
        .rank-item { background: var(--card); margin: 8px 15px; padding: 15px; border-radius: 8px; border-bottom: 1px solid #222; cursor: pointer; transition: 0.3s; }
        .rank-item:active { background: #222; }
        .v { color: #2ecc71; } .e { color: #f1c40f; } .d { color: #e74c3c; }

        .nav { position: fixed; bottom: 0; width: 100%; background: #111; border-top: 2px solid var(--dourado); display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; }
        .nav-link { color: #555; text-decoration: none; text-align: center; font-size: 22px; }
        .nav-link.active { color: var(--dourado); text-shadow: 0 0 10px var(--dourado); }
        .btn-gold { background: var(--dourado); color: black; border: none; padding: 15px; width: 95%; font-weight: bold; border-radius: 5px; margin: 10px 0; cursor: pointer; text-transform: uppercase; }
        input { background: #222; border: 1px solid var(--dourado); color: white; padding: 12px; width: 85%; margin: 5px 0; border-radius: 5px; }
    </style>
</head>
<body>

<div id="loading"><i class="fas fa-eye eye"></i><p style="color:var(--dourado)">CARREGANDO RELÍQUIAS...</p></div>

<!-- DASHBOARD -->
<div id="cont-home" class="aba">
    <div class="header-duel">
        <h3 style="color:var(--dourado); margin-bottom: 15px;">TOP 3 DUELISTAS</h3>
        <div class="podium" id="podio"></div>
    </div>
    <div class="dash-grid">
        <div class="stat-card"><small>DUELOS TOTAIS</small><br><b id="d-totais">0</b></div>
        <div class="stat-card"><small>ESTRELAS TOTAIS</small><br><b id="e-totais">0</b></div>
        <div class="stat-card"><small>MAIOR APOSTA</small><br><b>10 ⭐</b></div>
        <div class="stat-card"><small>O SHARK</small><br><b id="shark">---</b></div>
    </div>
    <div style="background:var(--card); margin:15px; padding:15px; border:1px solid var(--roxo); border-radius:10px;">
        <small style="color:var(--dourado)">MURAL DO JUIZ:</small>
        <p id="mural-txt" style="margin-top:5px; font-size:14px;">É hora do Duelo!</p>
    </div>
</div>

<!-- RANKING COMPLETO -->
<div id="cont-ranking" class="aba" style="display:none; padding:15px;">
    <h3 style="color:var(--dourado); text-align:center;">CLASSIFICAÇÃO DETALHADA</h3>
    <div id="lista-rank"></div>
</div>

<!-- PERFIL / REGISTRO -->
<div id="cont-perfil" class="aba" style="display:none; padding:20px; text-align:center;">
    <div id="box-reg">
        <h3 style="color:var(--dourado)">NOVO REGISTRO</h3>
        <input type="text" id="nick" placeholder="Nickname">
        <input type="text" id="deck" placeholder="Seu Deck Principal">
        <input type="password" id="pass" placeholder="Senha">
        <button class="btn-gold" onclick="registrar()">INICIAR JORNADA</button>
    </div>
    <div id="box-log" style="display:none; background:var(--card); padding:20px; border-radius:15px; border:2px solid var(--dourado);">
        <h2 id="m-nick" style="color:var(--dourado); margin-bottom:5px;"></h2>
        <p id="m-id" style="opacity:0.5; font-size:12px;"></p>
        <hr style="border:0; border-top:1px solid #333; margin:15px 0;">
        <p>Deck: <b id="m-deck"></b></p>
        <p>Estrelas: <b id="m-e" style="color:var(--dourado)">0</b></p>
        <p>Duelos: <b id="m-dt">0</b> | Winrate: <b id="m-wr" class="v">0%</b></p>
        <button class="btn-gold" onclick="logout()" style="background:#444;">SAIR DA CONTA</button>
    </div>
</div>

<nav class="nav">
    <a href="#" class="nav-link active" onclick="mudar(this, 'home')"><i class="fas fa-home"></i></a>
    <a href="#" class="nav-link" onclick="mudar(this, 'ranking')"><i class="fas fa-trophy"></i></a>
    <a href="#" class="nav-link" onclick="mudar(this, 'perfil')"><i class="fas fa-user-circle"></i></a>
</nav>

<script>
    const URL = "https://script.google.com/macros/s/AKfycbyDvLfyGsCeoPEp2XZTKqrbDYR2brbs19diA7-dv5Lw43GigVjNtZHYV0Djeuckg-puhw/exec"; // <--- COLOQUE SUA URL DO GOOGLE SCRIPT

    async function atualizar() {
        try {
            const rRank = await fetch(URL + "?acao=getRanking", {redirect:"follow"});
            const ranking = await rRank.json();
            const rDash = await fetch(URL + "?acao=getDashboard", {redirect:"follow"});
            const dash = await rDash.json();

            // Dash
            document.getElementById('e-totais').innerText = dash.totalEstrelas || 0;
            document.getElementById('d-totais').innerText = dash.totalDuelos || 0;
            document.getElementById('shark').innerText = dash.shark || "---";
            document.getElementById('mural-txt').innerText = dash.mural || "Prepare seu Deck!";

            // Pódio
            const p = document.getElementById('podio');
            if(ranking.length > 0) {
                p.innerHTML = `
                    <div class="p-card t2"><b>2º</b><br>${ranking[1]?.nick || '---'}<br><small>${ranking[1]?.deck || ''}</small></div>
                    <div class="p-card t1"><i class="fas fa-crown" style="color:var(--dourado)"></i><br><b>${ranking[0]?.nick}</b><br><small>${ranking[0]?.deck}</small></div>
                    <div class="p-card t3"><b>3º</b><br>${ranking[2]?.nick || '---'}<br><small>${ranking[2]?.deck || ''}</small></div>
                `;
            }

            // Ranking Detalhado
            document.getElementById('lista-rank').innerHTML = ranking.map((d,i) => `
                <div class="rank-item" onclick="alert('Duelista: ${d.nick}\\nDeck: ${d.deck}\\nDuelos: ${d.totalDuelos}\\nWinrate: ${d.winrate}')">
                    <div style="display:flex; align-items:center;">
                        <b style="color:var(--dourado); margin-right:15px;">${i+1}º</b>
                        <div>
                            <b>${d.nick}</b><br>
                            <small style="opacity:0.6">${d.deck}</small>
                        </div>
                    </div>
                    <div style="text-align:right">
                        <b style="color:var(--dourado)">${d.estrelas} ⭐</b><br>
                        <small class="v">${d.winrate}</small>
                    </div>
                </div>
            `).join('');

            // Perfil Logado
            const meuId = localStorage.getItem('y_id');
            if(meuId) {
                const eu = ranking.find(r => r.nick === localStorage.getItem('y_n'));
                if(eu) {
                    document.getElementById('m-e').innerText = eu.estrelas;
                    document.getElementById('m-wr').innerText = eu.winrate;
                    document.getElementById('m-dt').innerText = eu.totalDuelos;
                    document.getElementById('m-deck').innerText = eu.deck;
                }
            }

            document.getElementById('loading').style.display = 'none';
        } catch(e) { document.getElementById('loading').style.display = 'none'; }
    }

    async function registrar() {
        const n = document.getElementById('nick').value, d = document.getElementById('deck').value, p = document.getElementById('pass').value;
        if(!n || !d || !p) return alert("Preencha todos os campos!");
        const res = await fetch(`${URL}?acao=registrar&nick=${n}&deck=${d}&senha=${p}`, {redirect:"follow"});
        const r = await res.json();
        if(r.sucesso) { localStorage.setItem('y_id', r.id); localStorage.setItem('y_n', n); location.reload(); }
        else alert(r.erro);
    }

    function mudar(el, aba) {
        document.querySelectorAll('.aba').forEach(a => a.style.display = 'none');
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.getElementById('cont-' + aba).style.display = 'block';
        el.classList.add('active');
        if(aba === 'home' || aba === 'ranking') atualizar();
    }

    function verificar() {
        const id = localStorage.getItem('y_id');
        if(id) {
            document.getElementById('box-reg').style.display = 'none';
            document.getElementById('box-log').style.display = 'block';
            document.getElementById('m-nick').innerText = localStorage.getItem('y_n');
            document.getElementById('m-id').innerText = "ID: " + id;
        }
    }
    
    window.onload = () => { atualizar(); verificar(); };
    function logout() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
