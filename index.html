<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YGO Tournament</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root { --dourado: #d4af37; --roxo: #4b0082; --preto: #050505; --card: #151515; }
        body { background: var(--preto); color: white; font-family: sans-serif; margin: 0; padding-bottom: 80px; }
        
        /* Dashboard Épico */
        .header-duel { background: linear-gradient(to bottom, var(--roxo), var(--preto)); padding: 30px 10px; text-align: center; border-bottom: 3px solid var(--dourado); }
        .podium-box { display: flex; justify-content: center; align-items: flex-end; gap: 8px; padding: 20px 5px; }
        .p-card { background: var(--card); border: 2px solid var(--dourado); border-radius: 8px; text-align: center; padding: 10px; flex: 1; position: relative; }
        .t1 { height: 160px; border-width: 4px; box-shadow: 0 0 20px rgba(212,175,55,0.4); order: 2; }
        .t2 { height: 130px; order: 1; opacity: 0.9; }
        .t3 { height: 110px; order: 3; opacity: 0.8; }
        
        /* Botões e Inputs */
        input { background: #222; border: 1px solid var(--dourado); color: white; padding: 12px; width: 85%; margin: 10px 0; border-radius: 5px; }
        .btn-gold { background: var(--dourado); color: black; border: none; padding: 15px; width: 92%; font-weight: bold; border-radius: 5px; cursor: pointer; text-transform: uppercase; }
        
        /* Menu Inferior Estilizado */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #111; border-top: 2px solid var(--dourado); display: flex; justify-content: space-around; padding: 12px 0; z-index: 100; }
        .nav-link { color: var(--dourado); text-align: center; text-decoration: none; font-size: 20px; }
        .nav-link span { display: block; font-size: 10px; margin-top: 4px; }
    </style>
</head>
<body>

<div class="header-duel">
    <h2 style="color: var(--dourado); letter-spacing: 2px;">DASHBOARD</h2>
    <div class="podium-box" id="podio"></div>
</div>

<div id="cont-dash" class="aba" style="padding: 15px;">
    <div style="background: var(--card); padding: 15px; border-radius: 10px; border-left: 5px solid var(--roxo);">
        <p><i class="fas fa-bullhorn" style="color:var(--dourado)"></i> MURAL: <span id="msg-mural">Carregando...</span></p>
    </div>
</div>

<div id="cont-perfil" class="aba" style="display:none; padding: 20px; text-align: center;">
    <h3 style="color: var(--dourado)">REGISTRO DE DUELISTA</h3>
    <input type="text" id="nick" placeholder="Seu Nickname">
    <input type="text" id="deck" placeholder="Seu Deck">
    <input type="password" id="senha" placeholder="Senha">
    <button class="btn-gold" onclick="registrar()">INICIAR JORNADA</button>
</div>

<nav class="nav-bar">
    <a href="#" class="nav-link" onclick="mudar('dash')"><i class="fas fa-th-large"></i><span>Home</span></a>
    <a href="#" class="nav-link" onclick="mudar('perfil')"><i class="fas fa-user-plus"></i><span>Registrar</span></a>
</nav>

<script>
    const URL_API = "https://script.google.com/macros/s/AKfycbyDvLfyGsCeoPEp2XZTKqrbDYR2brbs19diA7-dv5Lw43GigVjNtZHYV0Djeuckg-puhw/exec"; // <--- ATUALIZE AQUI!

    async function carregar() {
        const res = await fetch(URL_API + "?acao=getDashboard", {redirect: "follow"});
        const d = await res.json();
        document.getElementById('msg-mural').innerText = d.mural || "Sem avisos.";
        
        // Pódio Simulado para o teste visual
        document.getElementById('podio').innerHTML = `
            <div class="p-card t2"><b>2º</b><br>---</div>
            <div class="p-card t1"><i class="fas fa-crown"></i><br><b>TOP 1</b><br>---</div>
            <div class="p-card t3"><b>3º</b><br>---</div>
        `;
    }

    async function registrar() {
        const n = document.getElementById('nick').value;
        const dk = document.getElementById('deck').value;
        const s = document.getElementById('senha').value;
        const res = await fetch(`${URL_API}?acao=registrar&nick=${n}&deck=${dk}&senha=${s}`, {redirect: "follow"});
        const r = await res.json();
        if(r.sucesso) alert("Sucesso! Seu ID: " + r.id);
        else alert("Erro: " + r.erro);
    }

    function mudar(aba) {
        document.querySelectorAll('.aba').forEach(a => a.style.display = 'none');
        document.getElementById('cont-' + aba).style.display = 'block';
    }
    
    window.onload = carregar;
</script>
</body>
</html>
