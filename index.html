<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YGO Arena</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root { --ouro: #d4af37; --prata: #c0c0c0; --bronze: #cd7f32; --roxo: #4b0082; --preto: #050505; --card: #151515; }
        body { background: var(--preto); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 90px; }
        
        #loading { position: fixed; inset: 0; background: var(--preto); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; }
        .eye { font-size: 60px; color: var(--ouro); animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* DASHBOARD - PODIUM */
        .header { background: linear-gradient(to bottom, var(--roxo), var(--preto)); padding: 20px 10px; border-bottom: 3px solid var(--ouro); text-align: center; }
        .podium { display: flex; justify-content: center; align-items: flex-end; gap: 8px; min-height: 200px; margin-top: 15px; }
        .p-card { background: var(--card); border-radius: 8px; padding: 10px; flex: 1; text-align: center; font-size: 11px; border: 2px solid #333; position: relative; }
        .t1 { height: 180px; border-color: var(--ouro); box-shadow: 0 0 15px var(--ouro); order: 2; }
        .t2 { height: 140px; border-color: var(--prata); order: 1; }
        .t3 { height: 110px; border-color: var(--bronze); order: 3; }
        .crown { color: var(--ouro); position: absolute; top: -25px; left: 50%; transform: translateX(-50%); font-size: 22px; }

        /* DASHBOARD - STATS */
        .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .stat-card { background: var(--card); border-left: 4px solid var(--ouro); padding: 12px; border-radius: 5px; text-align: center; }
        .stat-card i { color: var(--ouro); font-size: 18px; margin-bottom: 5px; }

        /* RANKING */
        .rank-box { background: var(--card); margin: 10px 15px; border-radius: 8px; border: 1px solid #333; overflow: hidden; }
        .rank-header { padding: 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        .rank-sub { padding: 8px 12px; display: flex; justify-content: space-between; font-size: 10px; background: #0a0a0a; }
        .v { color: #2ecc71; } .e { color: #f1c40f; } .d { color: #e74c3c; }

        /* NAV MENU */
        .nav { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 2px solid var(--ouro); display: flex; justify-content: space-around; padding: 12px 0; z-index: 9999; }
        .nav-link { color: #555; text-decoration: none; text-align: center; font-size: 22px; transition: 0.3s; }
        .nav-link.active { color: var(--ouro); text-shadow: 0 0 10px var(--ouro); }
        .nav-link span { display: block; font-size: 9px; font-weight: bold; margin-top: 4px; text-transform: uppercase; }

        .secao { display: none; padding-top: 0; }
        .ativa { display: block; }
        .btn-gold { background: var(--ouro); color: black; border: none; padding: 14px; width: 95%; font-weight: bold; border-radius: 5px; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        input { background: #111; border: 1px solid var(--ouro); color: white; padding: 12px; width: 85%; margin: 5px 0; border-radius: 5px; outline: none; }
    </style>
</head>
<body>

<div id="loading"><i class="fas fa-eye eye"></i><p style="color:var(--ouro); margin-top:10px">É HORA DO DUELO!</p></div>

<!-- DASHBOARD -->
<div id="aba-home" class="secao ativa">
    <div class="header">
        <h3 style="color:var(--ouro); margin:0; letter-spacing: 2px;">REINO DOS DUELISTAS</h3>
        <div class="podium" id="podio-real">
            <div class="p-card t2"><b>TOP 2</b><br>---</div>
            <div class="p-card t1"><i class="fas fa-crown crown"></i><b>TOP 1</b><br>---</div>
            <div class="p-card t3"><b>TOP 3</b><br>---</div>
        </div>
    </div>
    <div class="dash-grid">
        <div class="stat-card"><i class="fas fa-swords"></i><br><small>DUELOS</small><br><b id="d-totais">0</b></div>
        <div class="stat-card"><i class="fas fa-star"></i><br><small>ESTRELAS</small><br><b id="e-totais">0</b></div>
        <div class="stat-card"><i class="fas fa-shark"></i><br><small>SHARK</small><br><b id="shark-n">---</b></div>
        <div class="stat-card"><i class="fas fa-trophy"></i><br><small>MAX APOSTA</small><br><b>10 ⭐</b></div>
    </div>
    <div style="background:var(--card); margin:15px; padding:15px; border-left:4px solid var(--roxo); border-radius:5px;">
        <small style="color:var(--ouro)">MURAL DO JUIZ:</small>
        <p id="mural-txt" style="margin-top:5px; font-size:13px; opacity:0.8;">Buscando avisos...</p>
    </div>
</div>

<!-- RANKING -->
<div id="aba-ranking" class="secao" style="padding-top:20px;">
    <h3 style="color:var(--ouro); text-align:center;">CLASSIFICAÇÃO</h3>
    <div id="render-ranking"></div>
</div>

<!-- ARENA -->
<div id="aba-arena" class="secao" style="padding:20px; text-align:center;">
    <h3 style="color:var(--ouro)">ARENA</h3>
    <div style="background:var(--card); padding:20px; border-radius:15px; border:1px solid var(--roxo);">
        <button class="btn-gold" onclick="alert('Duelo Normal')">DUELO NORMAL</button>
        <button class="btn-gold" onclick="alert('Busca 1⭐')">APOSTAR 1 ⭐</button>
        <button class="btn-gold" onclick="alert('Busca 3⭐')">APOSTAR 3 ⭐</button>
        <button class="btn-gold" onclick="alert('Busca 5⭐')">APOSTAR 5 ⭐</button>
        <button class="btn-gold" onclick="alert('Busca 10⭐')">APOSTAR 10 ⭐</button>
    </div>
</div>

<!-- PERFIL -->
<div id="aba-perfil" class="secao" style="padding:20px; text-align:center;">
    <div id="box-reg">
        <h3 style="color:var(--ouro)">REGISTRO</h3>
        <input type="text" id="nick" placeholder="Nickname">
        <input type="text" id="deck" placeholder="Seu Deck">
        <input type="password" id="pass" placeholder="Senha">
        <button class="btn-gold" onclick="registrar()">REGISTRAR</button>
    </div>
    <div id="box-log" style="display:none; background:var(--card); padding:25px; border-radius:10px; border:1px solid var(--ouro);">
        <h2 id="m-nick" style="color:var(--ouro)"></h2>
        <p id="m-id" style="font-size:10px; opacity:0.5;"></p>
        <button class="btn-gold" onclick="logout()" style="background:#444">SAIR</button>
    </div>
</div>

<!-- MENU INFERIOR FIXO -->
<nav class="nav">
    <a href="javascript:void(0)" class="nav-link active" onclick="mudar(this, 'home')"><i class="fas fa-home"></i><span>Home</span></a>
    <a href="javascript:void(0)" class="nav-link" onclick="mudar(this, 'ranking')"><i class="fas fa-trophy"></i><span>Rank</span></a>
    <a href="javascript:void(0)" class="nav-link" onclick="mudar(this, 'arena')"><i class="fas fa-swords"></i><span>Arena</span></a>
    <a href="javascript:void(0)" class="nav-link" onclick="mudar(this, 'perfil')"><i class="fas fa-user-circle"></i><span>Perfil</span></a>
</nav>

<script>
    const URL_API = "https://script.google.com/macros/s/AKfycbyDvLfyGsCeoPEp2XZTKqrbDYR2brbs19diA7-dv5Lw43GigVjNtZHYV0Djeuckg-puhw/exec"; 

    function mudar(el, id) {
        document.querySelectorAll('.secao').forEach(s => s.classList.remove('ativa'));
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.getElementById('aba-' + id).classList.add('ativa');
        el.classList.add('active');
        if(id === 'home' || id === 'ranking') carregar();
    }

    async function carregar() {
        try {
            const rRank = await fetch(URL_API + "?acao=getRanking", {redirect:"follow"});
            const ranking = await rRank.json();
            const rDash = await fetch(URL_API + "?acao=getDashboard", {redirect:"follow"});
            const dash = await rDash.json();

            // Dash Stats
            let totalE = 0, totalD = 0, shark = {n: "-", p: -1};
            ranking.forEach(d => {
                totalE += d.estrelas;
                totalD += (d.v + d.e + d.d);
                if(d.estrelas > shark.p) shark = {n: d.nick, p: d.estrelas};
            });

            document.getElementById('e-totais').innerText = totalE;
            document.getElementById('d-totais').innerText = Math.floor(totalD/2);
            document.getElementById('shark-n').innerText = shark.n;
            document.getElementById('mural-txt').innerText = dash.mural || "Duelos Iniciados!";

            // Pódio
            document.getElementById('podio-real').innerHTML = `
                <div class="p-card t2"><b>TOP 2</b><br>${ranking[1]?.nick || '---'}<br><small>${ranking[1]?.estrelas || 0}⭐</small></div>
                <div class="p-card t1"><i class="fas fa-crown crown"></i><b>TOP 1</b><br>${ranking[0]?.nick || '---'}<br><small>${ranking[0]?.deck || ''}</small></div>
                <div class="p-card t3"><b>TOP 3</b><br>${ranking[2]?.nick || '---'}<br><small>${ranking[2]?.estrelas || 0}⭐</small></div>
            `;

            // Ranking
            document.getElementById('render-ranking').innerHTML = ranking.map((d,i) => {
                let wr = (d.v + d.e + d.d) > 0 ? ((d.v / (d.v + d.e + d.d)) * 100).toFixed(0) : 0;
                return `
                <div class="rank-box">
                    <div class="rank-header"><span><b>${i+1}º</b> ${d.nick}</span><b>${d.estrelas} ⭐</b></div>
                    <div class="rank-sub">
                        <span>Deck: ${d.deck}</span>
                        <span><b class="v">V:${d.v}</b> <b class="e">E:${d.e}</b> <b class="d">D:${d.d}</b> | WR: <b>${wr}%</b></span>
                    </div>
                </div>`;
            }).join('');
        } catch(e) { console.warn("Sincronizando..."); }
        document.getElementById('loading').style.display = 'none';
    }

    async function registrar() {
        const n = document.getElementById('nick').value, d = document.getElementById('deck').value, p = document.getElementById('pass').value;
        if(!n || !d || !p) return alert("Preencha tudo!");
        document.getElementById('loading').style.display = 'flex';
        const res = await fetch(`${URL_API}?acao=registrar&nick=${n}&deck=${d}&senha=${p}`, {redirect:"follow"});
        const r = await res.json();
        if(r.sucesso) { localStorage.setItem('y_id', r.id); localStorage.setItem('y_n', n); location.reload(); }
        else { alert(r.erro); document.getElementById('loading').style.display = 'none'; }
    }

    window.onload = () => {
        const id = localStorage.getItem('y_id');
        if(id) {
            document.getElementById('box-reg').style.display = 'none';
            document.getElementById('box-log').style.display = 'block';
            document.getElementById('m-nick').innerText = localStorage.getItem('y_n');
            document.getElementById('m-id').innerText = "ID: " + id;
        }
        carregar();
    };
    function logout() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
