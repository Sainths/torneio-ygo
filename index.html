<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reino dos Duelistas</title>
    <!-- Fontes e Ícones -->
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="https://cloudflare.com">
    
    <style>
        :root {
            --roxo-profundo: #1a0033;
            --roxo-magico: #4b0082;
            --dourado-milenio: #d4af37;
            --preto-caos: #0a0a0a;
            --texto-claro: #e0e0e0;
        }

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(-45deg, #0a0a0a, #1a0033, #2e004d, #0a0a0a);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
            color: var(--texto-claro);
            font-family: 'Roboto', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* CARD DE LOGIN/REGISTRO */
        #auth-container {
            background: rgba(20, 0, 40, 0.8);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            border: 2px solid var(--dourado-milenio);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
            width: 90%;
            max-width: 350px;
            text-align: center;
            z-index: 1000;
        }

        h2 { font-family: 'Orbitron'; color: var(--dourado-milenio); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--roxo-magico);
            border-radius: 8px;
            color: white;
            outline: none;
            box-sizing: border-box;
        }

        input:focus { border-color: var(--dourado-milenio); }

        .btn-acao {
            width: 100%;
            padding: 14px;
            margin-top: 15px;
            background: linear-gradient(45deg, var(--roxo-magico), #8a2be2);
            border: 1px solid var(--dourado-milenio);
            color: white;
            font-family: 'Orbitron';
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            text-transform: uppercase;
        }

        #painel-principal { display: none; } /* Escondido por enquanto */
    </style>
</head>
<body>

    <!-- TELA DE ACESSO -->
    <div id="auth-container">
        <img src="icone.png" width="70" style="margin-bottom: 10px; filter: drop-shadow(0 0 5px var(--dourado-milenio));">
        <h2>Acesso</h2>

        <!-- Formulário de Login -->
        <div id="form-login">
            <input type="text" id="login-nick" placeholder="NICKNAME">
            <input type="password" id="login-pass" placeholder="SENHA">
            <button class="btn-acao" onclick="fazerLogin()">Entrar no Duelo</button>
            <p onclick="trocarTela(true)" style="font-size: 11px; color: var(--dourado-milenio); cursor: pointer; margin-top: 15px;">Novo Duelista? Registre-se</p>
        </div>

        <!-- Formulário de Registro -->
        <div id="form-reg" style="display: none;">
            <input type="text" id="reg-nick" placeholder="NICKNAME">
            <input type="text" id="reg-deck" placeholder="NOME DO DECK">
            <input type="password" id="reg-pass" placeholder="SENHA">
            <button class="btn-acao" onclick="fazerRegistro()">Criar Conta</button>
            <p onclick="trocarTela(false)" style="font-size: 11px; color: var(--dourado-milenio); cursor: pointer; margin-top: 15px;">Já tem conta? Login</p>
        </div>
    </div>

    <!-- PAINEL PRINCIPAL (Vazio por enquanto para teste) -->
    <div id="painel-principal">
        <h1 style="color: gold;">ARENA ATIVA</h1>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxC0XhER6BfC_RBcRhCDtTGu6EJtJk81ycieIsHz3_3xSKaCxWmse2IhVQ1lk7RLjleHw/exec";

        function trocarTela(mostrarRegistro) {
            document.getElementById('form-login').style.display = mostrarRegistro ? 'none' : 'block';
            document.getElementById('form-reg').style.display = mostrarRegistro ? 'block' : 'none';
        }

        function fazerLogin() {
            alert("Login clicado! Vamos testar a troca de tela primeiro.");
        }

        function fazerRegistro() {
            alert("Registro clicado!");
        }
    </script>
</body>
</html>
