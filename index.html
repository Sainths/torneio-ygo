<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YGO Arena</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root { --dourado: #d4af37; --roxo: #4b0082; --preto: #050505; --card: #151515; --v: #2ecc71; --e: #f1c40f; --d: #e74c3c; }
        body { background: var(--preto); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 80px; overflow-x: hidden; }
        
        #loading { position: fixed; inset: 0; background: var(--preto); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .eye { font-size: 60px; color: var(--dourado); animation: blink 1.5s infinite; text-shadow: 0 0 20px var(--dourado); }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .header { background: linear-gradient(to bottom, var(--roxo), var(--preto)); padding: 20px; border-bottom: 3px solid var(--dourado); text-align: center; }
        .podium { display: flex; justify-content: center; align-items: flex-end; gap: 10px; min-height: 200px; padding: 10px; }
        .p-card { background: var(--card); border: 2px solid var(--dourado); border-radius: 8px; padding: 10px; flex: 1; text-align: center; font-size: 12px; position: relative; }
        .t1 { height: 180px; border-width: 4px; box-shadow: 0 0 20px var(--dourado); order: 2; }
        .t2 { height: 140px; order: 1; } .t3 { height: 110px; order: 3; }
        .crown { color: var(--dourado); position: absolute; top: -30px; left: 50%; transform: translateX(-50%); font-size: 25px; }

        .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .stat-card { background: var(--card); border-left: 4px solid var(--dourado); padding: 15px; border-radius: 8px; text-align: center; }
        .stat-card i { color: var(--dourado); font-size: 20px; margin-bottom: 8px; }

        .rank-box { background: var(--card); margin: 10px 15px; border-radius: 8px; border: 1px solid #333; overflow: hidden; }
        .rank-main { padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        .rank-sub { padding: 8px 15px; display: flex; justify-content: space-between; font-size: 10px; background: #0d0d0d; color: #aaa; }

        .nav { position: fixed; bottom: 0; width: 100%; background: #0a0a0a; border-top: 2px solid var(--dourado); display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; }
        .nav-link { color: #444; text-decoration: none; text-align: center; font-size: 24px; }
        .nav-link.active { color: var(--dourado); text-shadow: 0 0 10px var(--dourado); }
        .nav-link span { display: block; font-size: 10px; font-weight: bold; margin-top: 4px; }

        .btn-gold { background: linear-gradient(45deg, #d4af37, #f1c40f); color: black; border: none; padding: 15px; width: 95%; font-weight: bold; border-radius: 5px; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        input { background: #1a1a1a; border: 1px solid var(--dourado); color: white; padding: 12px; width: 90%; margin: 8px 0; border-radius: 5px; outline: none; }
    </style>
</head>
<body>

<div id="loading"><i class="fas fa-eye eye"></i><p style="color:var(--dourado); letter-spacing:2px; margin-top:10px;">É HORA DO DUELO!</p></div>

<main id="app-content">
    <!-- HOME -->
    <div id="aba-home" class="secao">
        <div class="header">
            <h3 style="color:var(--dourado); margin:0;">DASHBOARD LENDÁRIO</h3>
            <div class="podium" id="render-podio"></div>
        </div>
        <div class="dash-grid">
            <div class="stat-card"><i class="fas fa-swords"></i><br><small>DUELOS</small><br><b id="d-totais">0</b></div>
            <div class="stat-card"><i class="fas fa-star"></i><br><small>ESTRELAS</small><br><b id="e-totais">0</b></div>
            <div class="stat-card"><i class="fas fa-trophy"></i><br><small>MAIOR APOSTA</small><br><b>10 ⭐</b></div>
            <div class="stat-card"><i class="fas fa-shark"></i><br><small>O SHARK</small><br><b id="shark">---</b></div>
        </div>
        <div style="background:var(--card); margin:15px; padding:15px; border-left:4px solid var(--roxo); border-radius:5px;">
            <small style="color:var(--dourado)">MURAL:</small>
            <p id="mural-txt" style="margin:5px 0; font-size:13px; opacity:0.8;">Buscando avisos...</p>
        </div>
    </div>

    <!-- RANKING -->
    <div id="aba-ranking" class="secao" style="display:none; padding-top:20px;">
        <h3 style="color:var(--dourado); text-align:center;">CLASSIFICAÇÃO</h3>
        <div id="render-ranking"></div>
    </div>

    <!-- ARENA -->
    <div id="aba-arena" class="secao" style="display:none; padding:20px; text-align:center;">
        <h3 style="color:var(--dourado)">ARENA</h3>
        <div style="background:var(--card); padding:20px; border-radius:15px; border:1px solid var(--roxo);">
            <button class="btn-gold" onclick="alert('Duelo Normal')">NORMAL</button>
            <button class="btn-gold" onclick="alert('Busca 1⭐')">1 ESTRELA</button>
            <button class="btn-gold" onclick="alert('Busca 3⭐')">3 ESTRELAS</button>
            <button class="btn-gold" onclick="alert('Busca 5⭐')">5 ESTRELAS</button>
            <button class="btn-gold" onclick="alert('Busca 10⭐')">10 ESTRELAS</button>
        </div>
    </div>

    <!-- PERFIL -->
    <div id="aba-perfil" class="secao" style="display:none; padding:20px; text-align:center;">
        <div id="box-reg">
            <h3 style="color:var(--dourado)">NOVO REGISTRO</h3>
            <input type="text" id="nick" placeholder="Nickname">
            <input type="text" id="deck" placeholder="Seu Deck">
            <input type="password" id="pass" placeholder="Senha">
            <button class="btn-gold" onclick="registrar()">INICIAR</button>
        </div>
        <div id="box-log" style="display:none; background:var(--card); padding:25px; border-radius:15px; border:2px solid var(--dourado);">
            <i class="fas fa-user-circle" style="font-size:50px; color:var(--dourado)"></i>
            <h2 id="meu-nick-txt" style="color:var(--dourado); margin: 10px 0;"></h2>
            <p id="meu-id-txt" style="font-size:10px; opacity:0.5;"></p>
            <button class="btn-gold" onclick="logout()" style="background:#444; margin-top:20px;">SAIR</button>
        </div>
    </div>
</main>

<nav class="nav">
    <a href="javascript:void(0)" class="nav-link active" onclick="mudarAba(this, 'home')"><i class="fas fa-home"></i><span>Dash</span></a>
    <a href="javascript:void(0)" class="nav-link" onclick="mudarAba(this, 'ranking')"><i class="fas fa-trophy"></i><span>Rank</span></a>
    <a href="javascript:void(0)" class="nav-link" onclick="mudarAba(this, 'arena')"><i class="fas fa-swords"></i><span>Arena</span></a>
    <a href="javascript:void(0)" class="nav-link" onclick="mudarAba(this, 'perfil')"><i class="fas fa-user-circle"></i><span>Perfil</span></a>
</nav>

<script>
    const URL_API = "https://script.google.com/macros/s/AKfycbyDvLfyGsCeoPEp2XZTKqrbDYR2brbs19diA7-dv5Lw43GigVjNtZHYV0Djeuckg-puhw/exec"; // <--- COLOQUE SUA URL /exec AQUI

    // Função Segura para atualizar texto
    function setTxt(id, val) {
        const el = document.getElementById(id);
        if(el) el.innerText = val;
    }

    async function atualizar() {
        try {
            const rR = await fetch(URL_API + "?acao=getRanking", {redirect:"follow"});
            const ranking = await rR.json();
            const rD = await fetch(URL_API + "?acao=getDashboard", {redirect:"follow"});
            const dash = await rD.json();

            setTxt('e-totais', dash.totalEstrelas || 0);
            setTxt('d-totais', dash.totalDuelos || 0);
            setTxt('shark', dash.shark || "---");
            setTxt('mural-txt', dash.mural || "Duelo Liberado!");

            const p = document.getElementById('render-podio');
            if(p && ranking.length > 0) {
                p.innerHTML = `
                    <div class="p-card t2"><b>2º</b><br>${ranking[1]?.nick || '---'}<br><small>${ranking[1]?.estrelas || 0}⭐</small></div>
                    <div class="p-card t1"><i class="fas fa-crown crown"></i><b>${ranking[0]?.nick}</b><br><small>${ranking[0]?.estrelas}⭐</small></div>
                    <div class="p-card t3"><b>3º</b><br>${ranking[2]?.nick || '---'}<br><small>${ranking[2]?.estrelas || 0}⭐</small></div>
                `;
            }

            const list = document.getElementById('render-ranking');
            if(list) {
                list.innerHTML = ranking.map((d,i) => `
                    <div class="rank-box">
                        <div class="rank-main"><span><b style="color:var(--dourado)">${i+1}º</b> ${d.nick}</span><b>${d.estrelas} ⭐</b></div>
                        <div class="rank-sub"><span>Deck: ${d.deck}</span><span>V:${d.v} E:${d.e} D:${d.d} | <b>WR: ${d.winrate}</b></span></div>
                    </div>
                `).join('');
            }
        } catch(e) { console.warn("Sincronia Pendente..."); }
        document.getElementById('loading').style.display = 'none';
    }

    function mudarAba(el, nome) {
        document.querySelectorAll('.secao').forEach(a => a.style.display = 'none');
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        const target = document.getElementById('aba-' + nome);
        if(target) target.style.display = 'block';
        el.classList.add('active');
    }

    async function registrar() {
        const n = document.getElementById('nick').value, d = document.getElementById('deck').value, p = document.getElementById('pass').value;
        if(!n || !d || !p) return alert("Preencha tudo!");
        document.getElementById('loading').style.display = 'flex';
        const res = await fetch(`${URL_API}?acao=registrar&nick=${n}&deck=${d}&senha=${p}`, {redirect:"follow"});
        const r = await res.json();
        if(r.sucesso) { localStorage.setItem('y_id', r.id); localStorage.setItem('y_n', n); location.reload(); }
        else { alert(r.erro); document.getElementById('loading').style.display = 'none'; }
    }

    window.onload = () => {
        const id = localStorage.getItem('y_id');
        const nick = localStorage.getItem('y_n');
        if(id && nick) {
            const bR = document.getElementById('box-reg');
            const bL = document.getElementById('box-log');
            if(bR) bR.style.display = 'none';
            if(bL) bL.style.display = 'block';
            setTxt('meu-nick-txt', nick);
            setTxt('meu-id-txt', "ID: " + id);
        }
        atualizar();
    };
    function logout() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
