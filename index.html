<style>
input {

        html, body {

        :root { 
            --roxo-profundo: #1a0033;

<style>
}

        /* --- DASHBOARD TOP 3 --- */

            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 25px;
        }

            background: rgba(75, 0, 130, 0.2);
            border-left: 4px solid var(--dourado-milenio);

</style>
    
<style>

}

<body>
    
    <!-- LOADER CORRIGIDO (Começa escondido para não travar no meio da tela) -->
    <div id="loader" style="display: none !important; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); flex-direction: column; justify-content: center; align-items: center; z-index: 9999;">
        <div class="spinner"></div>
        <p id="loader-msg" style="margin-top:20px; font-family:'Orbitron'; color: gold;">Invocando...</p>
    </div>

    <!-- CONTAINER DE LOGIN CENTRALIZADO -->
    <div id="auth-container">
    <!-- ÍCONE E TÍTULO -->
    <div style="text-align: center; margin-bottom: 20px;">
        <img src="icone.png" width="70" style="filter: drop-shadow(0 0 8px var(--dourado-milenio));">
        <h2 style="color: var(--dourado-milenio); font-family: 'Orbitron'; font-size: 18px; margin: 10px 0 0 0;">REINO DOS DUELISTAS</h2>
    </div>

    <!-- CARD DE LOGIN -->
    <div id="form-login" style="background: rgba(30, 0, 60, 0.6); backdrop-filter: blur(15px); padding: 25px; border-radius: 20px; border: 1px solid var(--dourado-milenio); box-shadow: 0 0 20px rgba(0,0,0,0.5); width: 100%; max-width: 320px;">
        <div style="margin-bottom: 15px;">
            <input type="text" id="login-usuario" placeholder="NICKNAME" style="margin-bottom: 10px;">
            <input type="password" id="login-pass" placeholder="SENHA">
        </div>
        <button class="btn-acao" onclick="executarLogin()">ENTRAR NO DUELO</button>
        <p onclick="alternarAuth(true)" style="cursor:pointer; font-size: 11px; color: var(--dourado-milenio); text-align: center; margin-top: 15px; position: relative; z-index: 1000;">
           NOVO DUELISTA? REGISTRE-SE
        </p>
    </div>

    <!-- CARD DE REGISTRO (Escondido por padrão) -->
    <div id="form-registro" style="display: none; background: rgba(30, 0, 60, 0.6); backdrop-filter: blur(15px); padding: 25px; border-radius: 20px; border: 1px solid var(--roxo-magico); box-shadow: 0 0 20px rgba(0,0,0,0.5); width: 100%; max-width: 320px;">
        <h3 style="color: #fff; font-size: 14px; text-align: center; margin-top: 0;">NOVO CADASTRO</h3>
        <input type="text" id="reg-usuario" placeholder="NICKNAME">
        <input type="text" id="reg-deck-name" placeholder="NOME DO DECK">
        <input type="password" id="reg-pass" placeholder="SENHA">
        <button class="btn-acao" onclick="executarRegistro()" style="background: linear-gradient(45deg, #ffd700, #b8860b); color: #000;">CRIAR ID</button>
        <p onclick="alternarAuth(false)" style="cursor:pointer; font-size: 11px; color: var(--dourado-milenio); text-align: center; margin-top: 15px;">JÁ TEM ID? FAÇA LOGIN</p>
    </div>
</div>

<div id="painel-principal" class="app-container" style="display: none; flex-direction: column; gap: 20px;">
    
    <!-- 1. CABEÇALHO DO JOGADOR -->
    <div style="text-align: center; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; border: 1px solid var(--roxo-magico);">
        <div id="minha-conta-nome" style="font-family: 'Orbitron'; color: var(--dourado-milenio); font-size: 18px;">DUELISTA</div>
        <div style="font-size: 24px; margin-top: 5px;">
            <i class="fas fa-star" style="color: gold; text-shadow: 0 0 10px red;"></i> 
            <span id="minhas-estrelas-painel" style="font-weight: bold;">10</span>
        </div>
    </div>

    <!-- 2. DASHBOARD TOP 3 -->
    <div class="top3-container">
        <div class="card-top top-2">
            <i class="fas fa-medal"></i>
            <div style="font-size: 10px;">Top 2</div>
            <div id="top2-nome">--</div>
            <div style="color: var(--dourado-milenio); font-size: 12px;"><i class="fas fa-star"></i> <span id="top2-estrelas">0</span></div>
        </div>

        <div class="card-top rei-dos-jogos">
            <i class="fas fa-crown coroa"></i>
            <i class="fas fa-eye medal-icon" style="color: var(--dourado-milenio)"></i>
            <div style="font-size: 10px;">Rei dos Jogos</div>
            <div id="top1-nome" style="font-size: 16px; font-weight: bold; color: var(--dourado-milenio);">--</div>
            <div style="font-size: 14px;"><i class="fas fa-star"></i> <span id="top1-estrelas">0</span></div>
        </div>

        <div class="card-top top-3">
            <i class="fas fa-medal"></i>
            <div style="font-size: 10px;">Top 3</div>
            <div id="top3-nome">--</div>
            <div style="color: var(--dourado-milenio); font-size: 12px;"><i class="fas fa-star"></i> <span id="top3-estrelas">0</span></div>
        </div>
    </div>

    <!-- 3. CARDS DE ESTATÍSTICAS -->
    <div class="stats-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div class="stat-card"><i class="fas fa-layer-group"></i><span class="stat-value" id="total-estrelas">0</span><span class="stat-label">Estrelas Totais</span></div>
        <div class="stat-card"><i class="fas fa-fist-raised"></i><span class="stat-value" id="total-duelos">0</span><span class="stat-label">Duelos Gerais</span></div>
        <div class="stat-card"><i class="fas fa-shark"></i><span class="stat-value" id="shark-player">--</span><span class="stat-label">Shark</span></div>
        <div class="stat-card" onclick="verRegras()"><i class="fas fa-scroll"></i><span class="stat-value">REGRAS</span><span class="stat-label">Torneio</span></div>
    </div>

    <!-- 4. ARENA DE APOSTAS -->
    <div id="arena-apostas" style="background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; border: 1px solid var(--dourado-milenio);">
        <h3 style="font-family:'Orbitron'; color:var(--dourado-milenio); text-align:center; font-size:14px; margin-top:0;">SALAS DE APOSTAS</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn-sala" onclick="entrarSala(1)">1 <i class="fas fa-star"></i></button>
            <button class="btn-sala" onclick="entrarSala(3)">3 <i class="fas fa-star"></i></button>
            <button class="btn-sala" onclick="entrarSala(5)">5 <i class="fas fa-star"></i></button>
            <button class="btn-sala" onclick="entrarSala(10)">10 <i class="fas fa-star"></i></button>
        </div>
    </div>

    <!-- 5. ABA DO JUIZ -->
    <div id="aba-juiz" style="display:none; background: #1a0033; border: 2px solid gold; padding: 15px; border-radius: 10px;">
        <h3 style="color: gold; text-align: center; margin-top: 0;">PAINEL DO JUIZ</h3>
        <button class="btn-acao" style="background: #600;" onclick="resetarTorneio()">RESETAR TORNEIO</button>
        
        <!-- EDIÇÃO DE REGRAS (Movido para cá) -->
        <div style="margin-top:15px; border-top:1px solid #444; padding-top: 10px;">
            <h4 style="color:var(--dourado-milenio); font-size:12px;">EDITAR REGRAS</h4>
            <textarea id="edit-regras-input" style="width:100%; height:80px; background:#111; color:white; border:1px solid #444; border-radius:5px;"></textarea>

        </div>

    <!-- 6. BOTÕES DE NAVEGAÇÃO -->
    <button class="btn-acao" onclick="abrirPerfil()"><i class="fas fa-user-circle"></i> MEU PERFIL / RANKING</button>
    <button class="btn-acao" style="background: #333;" onclick="logout()"><i class="fas fa-sign-out-alt"></i> SAIR</button>

</div> <!-- FECHA PAINEL PRINCIPAL -->

<!-- MODAL PERFIL (Fora do painel para flutuar) -->
<div id="modal-perfil" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:2500; padding:20px; box-sizing:border-box;">
    <div style="background:linear-gradient(180deg, var(--roxo-profundo), #000); border:2px solid var(--dourado-milenio); padding:20px; border-radius:20px; text-align:center;">
        <div id="perfil-nick" style="font-family:'Orbitron'; color:var(--dourado-milenio); font-size:22px;">Duelista</div>
        <div style="background:rgba(255,255,255,0.05); border-radius:10px; padding:15px; display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin: 20px 0;">
            <div><span style="font-size:10px;">DECK</span><br><strong id="perfil-deck">--</strong></div>
            <div><span style="font-size:10px;">ESTRELAS</span><br><strong id="perfil-estrelas">0</strong></div>
        </div>
        <button class="btn-acao" onclick="fecharPerfil()">VOLTAR</button>
    </div>
</div>

<script>
    // URL que você copiou ao publicar o Google Apps Script (PARTE 1)
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxC0XhER6BfC_RBcRhCDtTGu6EJtJk81ycieIsHz3_3xSKaCxWmse2IhVQ1lk7RLjleHw/exec"; 

 // 2. FUNÇÃO DE TROCA (COLE LOGO ABAIXO DA URL)
    window.alternarAuth = function(mostrarRegistro) {
        console.log("Comando recebido: Mostrar registro =", mostrarRegistro);
        const login = document.getElementById('form-login');
        const registro = document.getElementById('form-registro');
        
        if (mostrarRegistro) {
            if(login) login.style.display = 'none';
            if(registro) registro.style.display = 'block';
        } else {
            if(login) login.style.display = 'block';
            if(registro) registro.style.display = 'none';
        }
    };
    
    // Armazenamento Local (Manter logado - Ponto 2 e 3)
    let jogadorLogado = JSON.parse(localStorage.getItem('duelista_v1')) || null;
    
// Função que o botão "ENTRAR" chama
async function executarLogin() {
    const nick = document.getElementById('login-usuario').value;
    const senha = document.getElementById('login-pass').value;

    if (!nick || !senha) {
        alert("Informe Nickname e Senha!");
        return;
    }
    // Chama a função logística que já temos
    await login(nick, senha);
}

// Função que o botão "CRIAR ID" chama
async function executarRegistro() {
    const nick = document.getElementById('reg-usuario').value;
    const deck = document.getElementById('reg-deck-name').value;
    const senha = document.getElementById('reg-pass').value;

    if (!nick || !deck || !senha) {
        alert("Preencha todos os campos, Duelista!");
        return;
    }
    // Chama a função logística que já temos
    await registrar(nick, deck, senha);
}

window.onload = () => {
    // Busca os dados do jogador que acabamos de salvar no registro
    const jogadorLogado = JSON.parse(localStorage.getItem('duelista_v1'));
    
    if (jogadorLogado) {
        // Se o jogador existe, mostra o app e esconde o login
        mostrarApp(); 
        if (typeof atualizarDashboard === "function") atualizarDashboard();
    } else {
        // Se não existe, garante que o login apareça
        document.getElementById('auth-container').style.display = 'flex';
        if (document.getElementById('painel-principal')) {
            document.getElementById('painel-principal').style.display = 'none';
        }
    }
};

function mostrarApp() {
    console.log("Iniciando visual do Dashboard...");
    const auth = document.getElementById('auth-container');
    const painel = document.getElementById('painel-principal');
    
    // 1. Esconde o login
    if (auth) auth.style.display = 'none';
    
    // 2. Tenta ligar o painel
    if (painel) {
        painel.style.display = 'flex'; // Força o painel a aparecer
        
        // 3. Preenche os dados apenas se os IDs existirem no HTML
        const dados = JSON.parse(localStorage.getItem('duelista_v1'));
        if (dados) {
            const campoNome = document.getElementById('minha-conta-nome');
            const campoEstrelas = document.getElementById('minhas-estrelas-painel');
            
            if (campoNome) campoNome.innerText = dados.nickname;
            if (campoEstrelas) campoEstrelas.innerText = dados.estrelas || 10;
        }
    } else {
        console.error("Erro: Div 'painel-principal' não encontrada no HTML!");
    }
}


// --- SISTEMA DE ACESSO ---
async function registrar(nick, deck, senha) {
    if (typeof exibirLoader === "function") exibirLoader(true, "Invocando ID do Destino...");
    try {
        const response = await fetch(WEB_APP_URL, {
            method: 'POST',
            body: JSON.stringify({
                action: 'registrar',
                nickname: nick,
                deck: deck,
                senha: senha
            })
        });
        const res = await response.json();
        
        if (res.status === "sucesso") {
            alert("Registro concluído! Seu ID é: " + res.id);
            localStorage.setItem('duelista_v1', JSON.stringify({
                id: res.id, 
                nickname: nick, 
                estrelas: 10
            }));
            location.reload(); 
        } else {
            alert("Erro: " + (res.message || "Falha no registro"));
        }
    } catch (e) {
        console.error("Erro no registro:", e);
        alert("Erro de conexão com o Reino dos Duelistas.");
    } finally {
        if (typeof exibirLoader === "function") exibirLoader(false);
    }
}

async function login(nick, senha) {
    if (typeof exibirLoader === "function") exibirLoader(true, "Verificando...");
    try {
        const response = await fetch(WEB_APP_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'login', nickname: nick, senha: senha })
        });
        const res = await response.json();
        if (res.status === "sucesso") {
            localStorage.setItem('duelista_v1', JSON.stringify(res));
            location.reload();
        } else {
            alert("Dados incorretos!");
        }
    } catch (e) {
        console.error(e);
        alert("Falha no servidor.");
    } finally {
        if (typeof exibirLoader === "function") exibirLoader(false);
    }
}

</script>
</body>
